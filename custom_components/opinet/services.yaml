# 코드 대신 명칭(select)으로 입력받고, 값으로는 오피넷 코드가 전달된다.
# 라벨은 strings.json 의 selector 블록에서 번역된다.

get_avg_all_price:

get_avg_sido_price:
  fields:
    sido:
      selector:
        select:
          translation_key: area
          options: ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10", "11", "14", "15", "16", "17", "18", "19"]
    prodcd:
      selector:
        select:
          translation_key: product
          options: ["B027", "B034", "D047", "C004", "K015"]

