get_around:
  fields:
    entity_id:
      selector:
        entity:
          domain:
            - device_tracker
            - person
            - zone
    latitude:
      example: 37.5665
      selector:
        number:
          min: -90
          max: 90
          step: 0.000001
          mode: box
    longitude:
      example: 126.978
      selector:
        number:
          min: -180
          max: 180
          step: 0.000001
          mode: box
    radius:
      required: true
      example: 5000
      selector:
        number:
          min: 1
          max: 5000
          mode: box
    prodcd:
      required: true
      selector:
        select:
          translation_key: product
          options: ["B027", "B034", "D047", "C004", "K015"]
    sort:
      selector:
        select:
          translation_key: sort
          options: ["1", "2"]

